<div class="flex min-h-screen">
    <!--sidebar-->
   <app-sidebar></app-sidebar>

    <!--Main Content-->
    <div class="flex-1 p-4 bg-gray-100 min-h-screen md:p-6 lg:p-8 pt-20 md:pt-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4 sm:text-center">
            <h1 class="text-3xl font-bold flex flex-col sm:flex-row gap-3 w-full md:w-auto">Employees</h1>
            <input type="text" placeholder="Search Employee" [(ngModel)]="searchText"
                class="border p-2 mb-3 rounded-lg w-full sm:w-64 px-4 py-2" />
        </div>
        <div class="bg-white rounded-xl shadow p-5 overflow-x-auto">
            <table class="min-w-[700px] w-full">
                <thead>
                    <tr class="border-b">
                        <th class="text-left px-4 py-3 whitespace-nowrap">Name</th>
                        <th class="text-left px-4 py-3 whitespace-nowrap ">Email</th>
                        <th class="text-left px-4 py-3 whitespace-nowrap ">Department</th>
                        <th class="text-left px-4 py-3 whitespace-nowrap">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b" *ngFor="let emp of filteredEmployees()">
                        <td class="px-4 py-3 whitespace-nowrap">{{ emp.name }}</td>
                        <td class="px-4 py-3 whitespace-nowrap">{{emp.email}}</td>
                        <td class="px-4 py-3 whitespace-nowrap">{{ emp.department}}</td>
                        <td class="px-4 py-3 whitespace-nowrap"><button (click)="deleteEmployee(emp._id)"
                                class="bg-red-500 text-white px-3 py-1 rounded">Delete</button></td>
                        <td class="px-4 py-3 whitespace-nowrap"><button (click)="editEmployee(emp)"
                                class="bg-blue-500 text-white px-3 py-1 rounded ml-2">Edit</button></td>
                    </tr>
                </tbody>
            </table>
            <div *ngIf="selectedEmployee" class="bg-white p-4 rounded shadow mb-4">
                <h2 class="text-xl font-bold mb-3">Edit Employee</h2>
                <input [(ngModel)]="selectedEmployee.name" class="border p-2 mr-2" placeholder="Name">
                <input [(ngModel)]="selectedEmployee.email" class="border p-2 mr-2" placeholder="email">
                <input [(ngModel)]="selectedEmployee.department" class="border p-2 mr-2" placeholder="department">
                <button (click)="updateEmployee()" class="bg-green-500 text-white px-4 py-2 rounded">Update</button>
            </div>
        </div>
    </div>
</div>
