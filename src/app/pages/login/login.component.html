<div class="h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

        <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">Employee Login</h1>

        <input [(ngModel)]="user.username" placeholder="admin" class="w-full border p-3 rounded-lg mb-4"/>
    
        <input [(ngModel)]="user.password" type="password" placeholder="1234" class="w-full border p-3 rounded-lg mb-4"/>
      
        <button (click)="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-gray-700">Login</button>

    </div>
</div>
